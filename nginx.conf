server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: client-side routes like /c/<code> must fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never long-cache the service worker or the manifest.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
    }

    location /assets/ {
        expires 7d;
        access_log off;
    }
}
