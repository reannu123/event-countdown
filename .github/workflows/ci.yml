name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-test:
    name: Lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  compose-validate:
    name: Validate compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet && docker compose -f compose.prod.yaml config --quiet && echo "compose OK"
